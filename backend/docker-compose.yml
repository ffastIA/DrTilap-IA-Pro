services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: dr_tilapia_api_dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../.env:/app/.env
    env_file:
      - ../.env
    restart: always

# Nota: Este compose é focado em desenvolvimento isolado do motor de IA.